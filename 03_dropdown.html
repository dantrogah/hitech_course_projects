<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown Navigation</title>
    <style>
      .container {
        background-color: rgb(26, 80, 80);
      }

      .container ul {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin: 0;
        padding: 0;
      }

      .container li {
        list-style: none;
      }

      .container a {
        text-decoration: none;
        color: #fff;
        display: block;
        padding: 10px;
      }

      .container div {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <ul>
        <li><a href="#">Home</a></li>
        <li>
          <a href="#">About</a>
          <div>
            <a href="#">Our Story</a>
            <a href="#">Team</a>
            <a href="#">Contacts</a>
          </div>
        </li>
        <li><a href="#">Products</a></li>
        <li><button class="login-btn">Login</button></li>
      </ul>
    </div>
  </body>
</html>
