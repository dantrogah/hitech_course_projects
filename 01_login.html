<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style/login.css" />
  </head>
  <body>
    <div class="container">
      <h2>Login</h2>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="username@example.com"
      />
      <input
        type="password"
        name="password"
        id="password"
        placeholder="Password"
      />
      <button>Login</button>
    </div>
  </body>
</html>
